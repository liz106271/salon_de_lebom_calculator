<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salon de Lebom韓國線下購物清單計算器</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Libre+Franklin:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="products-data.js"></script>
</head>
<body>

<header class="site-header">
  <p class="eyebrow">Order Calculator</p>
  <h1>𝑺𝒂𝒍𝒐𝒏 𝒅𝒆 𝑳𝒆𝒃𝒐𝒎</h1>
  <p class="subhead">2026.07.11 – 2026.08.16</p>

  <div class="filter-row">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search" type="text" placeholder="搜尋作品名稱或商品種類…" autocomplete="off">
    </div>
  </div>

  <div class="chip-line">
    <span class="chip-label">分類</span>
    <div class="chip-scroll">
      <button type="button" class="chip-arrow prev" id="categoryChipPrev" aria-label="向左捲動">‹</button>
      <div class="chip-row" id="categoryChipRow" role="group" aria-label="依商品種類篩選"></div>
      <button type="button" class="chip-arrow next" id="categoryChipNext" aria-label="向右捲動">›</button>
    </div>
  </div>
  <div class="chip-line">
    <span class="chip-label">作品</span>
    <div class="chip-scroll">
      <button type="button" class="chip-arrow prev" id="seriesChipPrev" aria-label="向左捲動">‹</button>
      <div class="chip-row" id="seriesChipRow" role="group" aria-label="依作品篩選"></div>
      <button type="button" class="chip-arrow next" id="seriesChipNext" aria-label="向右捲動">›</button>
    </div>
  </div>

  <p class="result-count" id="resultCount"></p>
</header>

<main>
  <div id="catalog"></div>
</main>

<footer id="ticket">
  <div class="ticket-inner">
    <div class="ticket-summary">
      <div class="ticket-stat">
        <span class="label">件數</span>
        <span class="value" id="statItems">0</span>
      </div>
      <div class="ticket-stat">
        <span class="label">總金額</span>
        <span class="value total" id="statTotal">KRW ₩0</span>
      </div>
            <p class="ticket-gift-hint" id="giftHint" aria-live="polite"></p>

      <div>
      <button id="exportBtn" type="button">匯出清單</button>
      <button id="importBtn" type="button">匯入清單</button>
      <input id="importFile" type="file" accept=".csv" style="display:none">
      <button id="createOrderBtn" type="button">建立訂單</button>
      <button id="toggleTicket" type="button" aria-expanded="false">查看清單</button>
      </div>
    </div>

    <div class="ticket-detail" id="ticketDetail">
      <div class="detail-grid">
        <div class="detail-col">
          <h3>已選商品</h3>
          <div id="itemList"></div>
        </div>
        <div class="detail-col">
          <h3>滿額贈品</h3>
          <div id="giftList"></div>
        </div>
      </div>
    </div>
  </div>
</footer>

<script>

/* 商品/分類/作品資料定義於 products-data.js（group-order.html 共用同一份） */

// 消費滿額贈品規則：每消費滿一定金額就送 1 張贈品，最多送到上限張數。
const GIFT_TIER_AMOUNT = 50000;
const GIFT_NAME = 'ver.B 증정(구매금액)';
const GIFT_MAX = 4;


/* ===================== everything below is generic ===================== */

const state = {
  qty: Object.fromEntries(PRODUCTS.map(p => [p.code, 0])),
  search: '',
  seriesFilter: null,
  categoryFilter: null,
  collapsedCategories: new Set(),
};

const fmtMoney = n => CONFIG.currency + n.toLocaleString(CONFIG.locale, { minimumFractionDigits: CONFIG.decimals ?? 2, maximumFractionDigits: CONFIG.decimals ?? 2 });
const fmtInt = n => n.toLocaleString(CONFIG.locale);

const catalogEl   = document.getElementById('catalog');
const categoryChipRowEl = document.getElementById('categoryChipRow');
const seriesChipRowEl   = document.getElementById('seriesChipRow');
const searchEl    = document.getElementById('search');
const resultCountEl = document.getElementById('resultCount');
const statItemsEl = document.getElementById('statItems');
const statTotalEl = document.getElementById('statTotal');
const giftHintEl  = document.getElementById('giftHint');
const itemListEl  = document.getElementById('itemList');
const giftListEl  = document.getElementById('giftList');
const toggleBtn   = document.getElementById('toggleTicket');

function uniqueSeries(){
  return [...new Set(PRODUCTS.map(p => p.series).filter(Boolean))];
}

function uniqueCategories(){
  const present = new Set(PRODUCTS.map(p => p.category));
  return CATEGORY_ORDER.filter(c => present.has(c));
}

// Wires a chip row up to its prev/next scroll buttons: clicking scrolls the
// row, and the buttons only show up once/while the row's content overflows.
function setupChipScroller(rowEl, prevBtn, nextBtn){
  function updateArrows(){
    const overflowing = rowEl.scrollWidth > rowEl.clientWidth + 1;
    prevBtn.classList.toggle('visible', overflowing && rowEl.scrollLeft > 0);
    nextBtn.classList.toggle('visible', overflowing && rowEl.scrollLeft < rowEl.scrollWidth - rowEl.clientWidth - 1);
  }
  prevBtn.addEventListener('click', () => rowEl.scrollBy({ left: -160, behavior: 'smooth' }));
  nextBtn.addEventListener('click', () => rowEl.scrollBy({ left: 160, behavior: 'smooth' }));
  rowEl.addEventListener('scroll', updateArrows);
  window.addEventListener('resize', updateArrows);
  return updateArrows;
}

const updateCategoryChipArrows = setupChipScroller(categoryChipRowEl, document.getElementById('categoryChipPrev'), document.getElementById('categoryChipNext'));
const updateSeriesChipArrows = setupChipScroller(seriesChipRowEl, document.getElementById('seriesChipPrev'), document.getElementById('seriesChipNext'));

function buildCategoryChips(){
  categoryChipRowEl.innerHTML = '';
  uniqueCategories().forEach(category => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.type = 'button';
    btn.textContent = category;
    btn.setAttribute('aria-pressed', state.categoryFilter === category ? 'true' : 'false');
    btn.addEventListener('click', () => {
      state.categoryFilter = state.categoryFilter === category ? null : category;
      buildCategoryChips();
      renderCatalog();
    });
    categoryChipRowEl.appendChild(btn);
  });
  updateCategoryChipArrows();
}

function buildSeriesChips(){
  seriesChipRowEl.innerHTML = '';
  uniqueSeries().forEach(series => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.type = 'button';
    btn.textContent = series;
    btn.setAttribute('aria-pressed', state.seriesFilter === series ? 'true' : 'false');
    btn.addEventListener('click', () => {
      state.seriesFilter = state.seriesFilter === series ? null : series;
      buildSeriesChips();
      renderCatalog();
    });
    seriesChipRowEl.appendChild(btn);
  });
  updateSeriesChipArrows();
}

function matchesFilter(p){
  const term = state.search.trim().toLowerCase();
  const matchesCategory = !state.categoryFilter || p.category === state.categoryFilter;
  const matchesSeries = !state.seriesFilter || p.series === state.seriesFilter;
  const matchesSearch = !term
    || (p.series && p.series.toLowerCase().includes(term))
    || p.category.toLowerCase().includes(term)
    || p.name.toLowerCase().includes(term)
    || (p.subname && p.subname.toLowerCase().includes(term));
  return matchesCategory && matchesSeries && matchesSearch;
}

function makeCard(p){
  const card = document.createElement('article');
  card.className = 'card';
  card.dataset.code = p.code;

  card.innerHTML = `
    <span class="sku">${p.code}・限量 ${p.limited}</span>
    <div class="info">
      <p class="series">${p.series || '隨機商品'}</p>
      <h2 class="name">${p.name}</h2>
      <p class="subname">${p.subname ? `${p.subname}．` : ''}<b>${fmtMoney(p.price)}</b></p>
    </div>
    <div class="stepper">
      <button type="button" class="dec" aria-label="減少「${p.name}」數量">−</button>
      <input class="qty-input" type="number" min="0" max="${p.limited}" step="1" inputmode="numeric"
             value="${state.qty[p.code]}" aria-label="「${p.name}」數量">
      <button type="button" class="inc" aria-label="增加「${p.name}」數量">+</button>
    </div>
  `;

  const input = card.querySelector('.qty-input');
  const dec = card.querySelector('.dec');
  const inc = card.querySelector('.inc');

  function setQty(n){
    n = Math.max(0, Math.min(p.limited, Math.floor(Number.isFinite(n) ? n : 0)));
    state.qty[p.code] = n;
    input.value = n;
    card.classList.toggle('has-qty', n > 0);
    inc.disabled = n >= p.limited;
    dec.disabled = n <= 0;
    updateTicket();
  }

  dec.addEventListener('click', () => setQty(state.qty[p.code] - 1));
  inc.addEventListener('click', () => setQty(state.qty[p.code] + 1));
  input.addEventListener('input', () => setQty(parseInt(input.value, 10)));
  input.addEventListener('blur', () => setQty(parseInt(input.value, 10) || 0));

  setQty(state.qty[p.code]);
  return card;
}

function renderCatalog(){
  catalogEl.innerHTML = '';
  const visible = PRODUCTS.filter(matchesFilter);

  if (visible.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = '沒有符合搜尋條件的商品。';
    catalogEl.appendChild(empty);
  } else {
    const bySeries = new Map(SERIES_LIST.map((s, i) => [s, i]));
    const byCategory = new Map(CATEGORY_ORDER.map((c, i) => [c, i]));

    const grouped = new Map();
    visible.forEach(p => {
      if (!grouped.has(p.category)) grouped.set(p.category, []);
      grouped.get(p.category).push(p);
    });

    [...grouped.keys()]
      .sort((a, b) => byCategory.get(a) - byCategory.get(b))
      .forEach(category => {
        const products = grouped.get(category)
          .sort((a, b) => (bySeries.get(a.series) ?? -1) - (bySeries.get(b.series) ?? -1));

        const collapsed = state.collapsedCategories.has(category);

        const block = document.createElement('section');
        block.className = 'category-block';

        const header = document.createElement('button');
        header.type = 'button';
        header.className = 'category-header';
        header.setAttribute('aria-expanded', String(!collapsed));
        const subcategory = products[0].subcategory;
        header.innerHTML = `<span class="cat-name">${category}${subcategory ? `<span class="cat-subname"> · ${subcategory}</span>` : ''}</span><span class="cat-count">${products.length} 項</span>`;
        header.addEventListener('click', () => {
          if (state.collapsedCategories.has(category)) state.collapsedCategories.delete(category);
          else state.collapsedCategories.add(category);
          renderCatalog();
        });

        const body = document.createElement('div');
        body.className = 'category-body';
        if (collapsed) body.hidden = true;
        products.forEach(p => body.appendChild(makeCard(p)));

        block.appendChild(header);
        block.appendChild(body);
        catalogEl.appendChild(block);
      });
  }

  resultCountEl.textContent = `顯示 ${visible.length} / ${PRODUCTS.length} 項商品`;
}

function computeCart(){
  const lines = PRODUCTS
    .map(p => ({ ...p, qty: state.qty[p.code] }))
    .filter(l => l.qty > 0);

  const totalItems = lines.reduce((sum, l) => sum + l.qty, 0);
  const totalAmount = lines.reduce((sum, l) => sum + l.qty * l.price, 0);

  return { lines, totalItems, totalAmount };
}

function updateTicket(){
  const { lines, totalItems, totalAmount } = computeCart();

  statItemsEl.textContent = fmtInt(totalItems);
  statTotalEl.textContent = fmtMoney(totalAmount);

  // Items breakdown
  itemListEl.innerHTML = '';
  if (lines.length === 0){
    itemListEl.innerHTML = '<p class="no-items">尚未選擇任何商品。</p>';
  } else {
    lines.forEach(l => {
      const row = document.createElement('div');
      row.className = 'item-row';
      const line1 = [l.code, ...(l.series === l.name ? [l.category, l.series]: [l.category, l.series, l.name])].filter(Boolean).join('．');
      const line2 = (l.subseries === l.subname ? [l.subcategory, l.subseries]: [l.subcategory, l.subseries, l.subname]).filter(Boolean).join('．');
      row.innerHTML = `
        <div class="item-lines">
          <div class="item-line1">${line1} <span class="n">×${l.qty}</span></div>
          ${line2 ? `<div class="item-line2">${line2}</div>` : ''}
        </div>
        <span class="item-amount">${fmtMoney(l.qty * l.price)}</span>
      `;
      itemListEl.appendChild(row);
    });
  }

  // Gift progress — 1 gift per GIFT_TIER_AMOUNT spent, capped at GIFT_MAX
  const giftCount = Math.min(GIFT_MAX, Math.floor(totalAmount / GIFT_TIER_AMOUNT));
  const maxedOut = giftCount >= GIFT_MAX;

  giftListEl.innerHTML = '';
  const row = document.createElement('div');
  row.className = 'gift-row' + (giftCount > 0 ? ' unlocked' : '');
  row.innerHTML = `
    <span class="gift-check">${giftCount > 0 ? '✓' : ''}</span>
    <span class="g-name">${GIFT_NAME}</span>
    <span class="g-req">已獲得 ${giftCount} / ${GIFT_MAX} 張</span>
  `;
  giftListEl.appendChild(row);

  // Hint line in the collapsed summary
  if (maxedOut){
    giftHintEl.innerHTML = `<b>已獲得全部 ${GIFT_MAX} 張 ${GIFT_NAME}</b> 🎉`;
  } else {
    const remaining = (giftCount + 1) * GIFT_TIER_AMOUNT - totalAmount;
    giftHintEl.innerHTML = `已獲得 <b>${giftCount} / ${GIFT_MAX}</b> 張 ${GIFT_NAME}，再加購 <b>${fmtMoney(remaining)}</b> 即可再得一張`;
  }
}

function csvEscape(v){
  const s = String(v ?? '');
  return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function exportCart(){
  const { lines, totalItems, totalAmount } = computeCart();
  if (lines.length === 0){
    alert('尚未選擇任何商品，無法匯出。');
    return;
  }

  const rows = [
    ['編號', '分類', '作品', '名稱', '原文分類', '原文作品', '原文名稱', '單價', '數量', '小計'],
    ...lines.map(l => [
      l.code,
      l.category, l.series || '', l.name,
      l.subcategory || '', l.subseries || '', l.subname || '',
      l.price, l.qty, l.qty * l.price,
    ]),
    [],
    ['總件數', totalItems],
    ['總金額', totalAmount],
  ];

  const csv = rows.map(r => r.map(csvEscape).join(',')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
  a.href = url;
  a.download = `購買清單_${ts}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

const exportBtn = document.getElementById('exportBtn');
exportBtn.addEventListener('click', exportCart);

function orderPageHtml(){
  const { lines, totalItems, totalAmount } = computeCart();
  const giftCount = Math.min(GIFT_MAX, Math.floor(totalAmount / GIFT_TIER_AMOUNT));

  const itemRows = lines.map(l => {
    const line1 = [l.code, ...(l.series === l.name ? [l.category, l.series] : [l.category, l.series, l.name])].filter(Boolean).join('．');
    const line2 = (l.subseries === l.subname ? [l.subcategory, l.subseries] : [l.subcategory, l.subseries, l.subname]).filter(Boolean).join('．');
    return `
      <div class="item-row">
        <div class="item-lines">
          <div class="item-line1">${line1} <span class="n">×${l.qty}</span></div>
          ${line2 ? `<div class="item-line2">${line2}</div>` : ''}
        </div>
        <span class="item-amount">${fmtMoney(l.qty * l.price)}</span>
      </div>`;
  }).join('');

  return `<!DOCTYPE html>

  *{ box-sizing:border-box; }
  body{ margin:0; padding:24px 20px 60px; background:var(--ink); color:var(--paper); font-family:'Libre Franklin', system-ui, sans-serif; }
  .container{ max-width:900px; width:100%; margin:0 auto; }

  .sub{ color:var(--paper-dim); font-size:13px; margin:0 0 24px; }

  .stat .value{ font-family:'IBM Plex Mono', ui-monospace, monospace; font-size:24px; font-weight:600; }

  .item-row{ display:flex; flex-wrap:wrap; justify-content:space-between; align-items:flex-start; font-size:13.5px; padding:8px 0; border-bottom:1px solid var(--line); gap:10px; }
  .item-row .n{ color:var(--paper-dim); font-family:'IBM Plex Mono', ui-monospace, monospace; }

  .gift-check{ width:16px; height:16px; border-radius:50%; border:1px solid var(--paper-dim); flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:10px; }
  .gift-row.unlocked .gift-check{ background:var(--forest); border-color:var(--forest); color:var(--paper); }

</head>
<body>
  <div class="container">
    <h1>訂單明細</h1>
    <p class="sub">${new Date().toLocaleString('zh-TW')}</p>
    <div class="stats">
      <div class="stat"><div class="label">件數</div><div class="value">${fmtInt(totalItems)}</div></div>
      <div class="stat"><div class="label">總金額</div><div class="value total">${fmtMoney(totalAmount)}</div></div>
    </div>
    <h3>已選商品</h3>
    ${itemRows || '<p class="no-items">尚未選擇任何商品。</p>'}
    <h3>滿額贈品</h3>
    <div class="gift-row${giftCount > 0 ? ' unlocked' : ''}">
      <span class="gift-check">${giftCount > 0 ? '✓' : ''}</span>
      <span class="g-name">${GIFT_NAME}</span>
      <span class="g-req">已獲得 ${giftCount} / ${GIFT_MAX} 張</span>
    </div>

}

function openOrderPage(){
  const { lines } = computeCart();
  if (lines.length === 0){
    alert('尚未選擇任何商品，無法建立訂單。');
    return;
  }
  const blob = new Blob([orderPageHtml()], { type: 'text/html;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  window.open(url, '_blank');
}

const createOrderBtn = document.getElementById('createOrderBtn');
createOrderBtn.addEventListener('click', openOrderPage);

function parseCsvLine(line){
  const cells = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++){
    const ch = line[i];
    if (inQuotes){
      if (ch === '"'){
        if (line[i + 1] === '"'){ cur += '"'; i++; }
        else { inQuotes = false; }
      } else {
        cur += ch;
      }
    } else if (ch === '"'){
      inQuotes = true;
    } else if (ch === ','){
      cells.push(cur);
      cur = '';
    } else {
      cur += ch;
    }
  }
  cells.push(cur);
  return cells;
}

function importCart(file){
  const reader = new FileReader();
  reader.onload = () => {
    const text = String(reader.result).replace(/^﻿/, '');
    const rawLines = text.split(/\r\n|\n/);
    // 新版 CSV 第一欄是「編號」；沒有編號欄位的舊版 CSV 第一欄就是分類，欄位需往後推移比對。
    const hasCodeColumn = parseCsvLine(rawLines[0] || '')[0] === '編號';
    const lines = rawLines.slice(1); // skip header row

    const qtyByCode = Object.fromEntries(PRODUCTS.map(p => [p.code, 0]));
    let importedCount = 0;
    let notFoundCount = 0;

    for (const line of lines){
      if (!line.trim()) break;
      const cells = parseCsvLine(line);
      const [code, category, series, name, , , , , qtyStr] = hasCodeColumn ? cells : [null, ...cells];
      if (category === '總件數' || category === '總金額') break;

      const qty = parseInt(qtyStr, 10);
      if (!qty) continue;

      // 優先用固定編號比對；找不到編號欄位（舊版 CSV）時，退回用分類+作品+名稱字串比對。
      const product = (code && PRODUCTS.find(p => p.code === code))
        || PRODUCTS.find(p => p.category === category && (p.series || '') === series && p.name === name);
      if (product){
        qtyByCode[product.code] = Math.min(qty, product.limited);
        importedCount++;
      } else {
        notFoundCount++;
      }
    }

    state.qty = qtyByCode;
    renderCatalog();
    updateTicket();

    alert(notFoundCount > 0
      ? `已匯入 ${importedCount} 筆，其中 ${notFoundCount} 筆找不到對應商品。`
      : `已匯入 ${importedCount} 筆。`);
  };
  reader.readAsText(file, 'utf-8');
}

const importBtn = document.getElementById('importBtn');
const importFileEl = document.getElementById('importFile');
importBtn.addEventListener('click', () => importFileEl.click());
importFileEl.addEventListener('change', () => {
  const file = importFileEl.files[0];
  if (file) importCart(file);
  importFileEl.value = '';
});

searchEl.addEventListener('input', () => {
  state.search = searchEl.value;
  renderCatalog();
});

toggleBtn.addEventListener('click', () => {
  const open = !document.body.classList.contains('ticket-open');
  document.body.classList.toggle('ticket-open', open);
  toggleBtn.setAttribute('aria-expanded', String(open));
  toggleBtn.textContent = open ? '收合清單' : '查看清單';
});

buildCategoryChips();
buildSeriesChips();
renderCatalog();
updateTicket();
</script>
</body>
</html>
