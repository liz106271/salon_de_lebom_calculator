<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>團購管理 - Salon de Lebom</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Libre+Franklin:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
  <p class="eyebrow">Group Order Manager</p>
  <h1>𝑺𝒂𝒍𝒐𝒏 𝒅𝒆 𝑳𝒆𝒃𝒐𝒎 代購</h1>

  <div class="participant-bar">
    <div class="participant-add">
      <input id="participantNameInput" type="text" placeholder="輸入跟團者名稱" autocomplete="off">
      <button id="addParticipantBtn" type="button">新增跟團者</button>
    </div>
    <div class="chip-scroll">
      <button type="button" class="chip-arrow prev" id="participantChipPrev" aria-label="向左捲動">‹</button>
      <div class="chip-row" id="participantChipRow" role="group" aria-label="跟團者列表"></div>
      <button type="button" class="chip-arrow next" id="participantChipNext" aria-label="向右捲動">›</button>
    </div>
    <div>
      <button type="button" class="view-toggle" id="viewToggleBtn" aria-pressed="false">檢視總購買清單</button>
    </div>
  </div>

  <div id="filterArea">
    <div class="filter-row">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="search" type="text" placeholder="搜尋作品名稱或商品種類…" autocomplete="off">
      </div>
    </div>

    <div class="chip-line">
      <span class="chip-label">分類</span>
      <div class="chip-scroll">
        <button type="button" class="chip-arrow prev" id="categoryChipPrev" aria-label="向左捲動">‹</button>
        <div class="chip-row" id="categoryChipRow" role="group" aria-label="依商品種類篩選"></div>
        <button type="button" class="chip-arrow next" id="categoryChipNext" aria-label="向右捲動">›</button>
      </div>
    </div>
    <div class="chip-line">
      <span class="chip-label">作品</span>
      <div class="chip-scroll">
        <button type="button" class="chip-arrow prev" id="seriesChipPrev" aria-label="向左捲動">‹</button>
        <div class="chip-row" id="seriesChipRow" role="group" aria-label="依作品篩選"></div>
        <button type="button" class="chip-arrow next" id="seriesChipNext" aria-label="向右捲動">›</button>
      </div>
    </div>

    <p class="result-count" id="resultCount"></p>
  </div>
</header>

<main>
  <div id="catalog"></div>
  <div id="summaryView" hidden></div>
</main>

<footer id="ticket">
  <div class="ticket-inner">
    <div class="ticket-summary">
      <div class="ticket-stat">
        <span class="label">件數</span>
        <span class="value" id="statItems">0</span>
      </div>
      <div class="ticket-stat">
        <span class="label">總金額</span>
        <span class="value total" id="statTotal">KRW ₩0</span>
      </div>

      <div>
      <button id="exportBtn" type="button">匯出清單</button>
      <button id="importBtn" type="button">匯入清單</button>
      <input id="importFile" type="file" accept=".csv" style="display:none">
      <button id="toggleTicket" type="button" aria-expanded="false">查看清單</button>
      </div>
    </div>

    <div class="ticket-detail" id="ticketDetail">
      <h3 id="itemListTitle">已選商品</h3>
      <div id="itemList"></div>
    </div>
  </div>
</footer>

  // 隨機商品（沒有 series）

let _nextId = 1;
const PRODUCTS = NAME_LIST.map(n => {
  const cat = [...CATEGORY_LIST, ...RANDOM_CATEGORY_LIST].find(c => c.category === n.category);
  const ser = n.series ? SERIES_LIST.find(s => s.series === n.series) : null;
  const id = _nextId++;
  return {
    id,
    series: n.series,
    subseries: ser ? ser.subseries : null,
    name: n.name,
    subname: n.subname,
    category: n.category,
    subcategory: cat.subcategory,
    note: cat.note,
    price: cat.price,
    limited: cat.limited,
  };
});

// category 的預設顯示/篩選順序：一般商品種類接著隨機商品種類。
const CATEGORY_ORDER = [...CATEGORY_LIST, ...RANDOM_CATEGORY_LIST].map(c => c.category);


/* ===================== 團購管理專用邏輯 ===================== */

const state = {
  participants: [],
  activeParticipantId: null,
  search: '',
  seriesFilter: null,
  categoryFilter: null,
  collapsedCategories: new Set(),
  view: 'picker', // 'picker' | 'summary'
};
let _nextParticipantId = 1;

const fmtMoney = n => CONFIG.currency + n.toLocaleString(CONFIG.locale, { minimumFractionDigits: CONFIG.decimals ?? 2, maximumFractionDigits: CONFIG.decimals ?? 2 });
const fmtInt = n => n.toLocaleString(CONFIG.locale);

const catalogEl   = document.getElementById('catalog');
const summaryViewEl = document.getElementById('summaryView');
const filterAreaEl = document.getElementById('filterArea');
const categoryChipRowEl = document.getElementById('categoryChipRow');
const seriesChipRowEl   = document.getElementById('seriesChipRow');
const participantChipRowEl = document.getElementById('participantChipRow');
const searchEl    = document.getElementById('search');
const resultCountEl = document.getElementById('resultCount');
const statItemsEl = document.getElementById('statItems');
const statTotalEl = document.getElementById('statTotal');
const itemListEl  = document.getElementById('itemList');
const itemListTitleEl = document.getElementById('itemListTitle');
const toggleBtn   = document.getElementById('toggleTicket');
const viewToggleBtn = document.getElementById('viewToggleBtn');
const participantNameInput = document.getElementById('participantNameInput');
const addParticipantBtn = document.getElementById('addParticipantBtn');

function uniqueSeries(){
  return [...new Set(PRODUCTS.map(p => p.series).filter(Boolean))];
}

function uniqueCategories(){
  const present = new Set(PRODUCTS.map(p => p.category));
  return CATEGORY_ORDER.filter(c => present.has(c));
}

// Wires a chip row up to its prev/next scroll buttons: clicking scrolls the
// row, and the buttons only show up once/while the row's content overflows.
function setupChipScroller(rowEl, prevBtn, nextBtn){
  function updateArrows(){
    const overflowing = rowEl.scrollWidth > rowEl.clientWidth + 1;
    prevBtn.classList.toggle('visible', overflowing && rowEl.scrollLeft > 0);
    nextBtn.classList.toggle('visible', overflowing && rowEl.scrollLeft < rowEl.scrollWidth - rowEl.clientWidth - 1);
  }
  prevBtn.addEventListener('click', () => rowEl.scrollBy({ left: -160, behavior: 'smooth' }));
  nextBtn.addEventListener('click', () => rowEl.scrollBy({ left: 160, behavior: 'smooth' }));
  rowEl.addEventListener('scroll', updateArrows);
  window.addEventListener('resize', updateArrows);
  return updateArrows;
}

const updateCategoryChipArrows = setupChipScroller(categoryChipRowEl, document.getElementById('categoryChipPrev'), document.getElementById('categoryChipNext'));
const updateSeriesChipArrows = setupChipScroller(seriesChipRowEl, document.getElementById('seriesChipPrev'), document.getElementById('seriesChipNext'));
const updateParticipantChipArrows = setupChipScroller(participantChipRowEl, document.getElementById('participantChipPrev'), document.getElementById('participantChipNext'));

function buildCategoryChips(){
  categoryChipRowEl.innerHTML = '';
  uniqueCategories().forEach(category => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.type = 'button';
    btn.textContent = category;
    btn.setAttribute('aria-pressed', state.categoryFilter === category ? 'true' : 'false');
    btn.addEventListener('click', () => {
      state.categoryFilter = state.categoryFilter === category ? null : category;
      buildCategoryChips();
      renderCatalog();
    });
    categoryChipRowEl.appendChild(btn);
  });
  updateCategoryChipArrows();
}

function buildSeriesChips(){
  seriesChipRowEl.innerHTML = '';
  uniqueSeries().forEach(series => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.type = 'button';
    btn.textContent = series;
    btn.setAttribute('aria-pressed', state.seriesFilter === series ? 'true' : 'false');
    btn.addEventListener('click', () => {
      state.seriesFilter = state.seriesFilter === series ? null : series;
      buildSeriesChips();
      renderCatalog();
    });
    seriesChipRowEl.appendChild(btn);
  });
  updateSeriesChipArrows();
}

function matchesFilter(p){
  const term = state.search.trim().toLowerCase();
  const matchesCategory = !state.categoryFilter || p.category === state.categoryFilter;
  const matchesSeries = !state.seriesFilter || p.series === state.seriesFilter;
  const matchesSearch = !term
    || (p.series && p.series.toLowerCase().includes(term))
    || p.category.toLowerCase().includes(term)
    || p.name.toLowerCase().includes(term)
    || (p.subname && p.subname.toLowerCase().includes(term));
  return matchesCategory && matchesSeries && matchesSearch;
}

/* ---- 跟團者管理 ---- */

function newParticipant(name){
  return { id: _nextParticipantId++, name, qty: Object.fromEntries(PRODUCTS.map(p => [p.id, 0])) };
}

function activeParticipant(){
  return state.participants.find(p => p.id === state.activeParticipantId) || null;
}

function addParticipant(rawName){
  const name = (rawName || '').trim();
  if (!name){
    alert('請輸入跟團者名稱。');
    return;
  }
  const p = newParticipant(name);
  state.participants.push(p);
  state.activeParticipantId = p.id;
  renderParticipantChips();
  renderMain();
  updateFooter();
}

function removeParticipant(id){
  const idx = state.participants.findIndex(p => p.id === id);
  if (idx === -1) return;
  const p = state.participants[idx];
  if (!confirm(`確定要移除跟團者「${p.name}」嗎？其已選購的品項將釋出給其他跟團者。`)) return;
  state.participants.splice(idx, 1);
  if (state.activeParticipantId === id){
    state.activeParticipantId = state.participants.length ? state.participants[0].id : null;
  }
  renderParticipantChips();
  renderMain();
  updateFooter();
}

function renameParticipant(id){
  const p = state.participants.find(x => x.id === id);
  if (!p) return;
  const name = prompt('修改跟團者名稱', p.name);
  if (name === null) return;
  const trimmed = name.trim();
  if (!trimmed){
    alert('名稱不可空白。');
    return;
  }
  if (state.participants.some(x => x.id !== id && x.name === trimmed)){
    if (!confirm('已有相同名稱的跟團者，仍要使用這個名稱嗎？')) return;
  }
  p.name = trimmed;
  renderParticipantChips();
  updateFooter();
}

function setActiveParticipant(id){
  state.activeParticipantId = id;
  renderParticipantChips();
  renderMain();
  updateFooter();
}

function renderParticipantChips(){
  participantChipRowEl.innerHTML = '';
  state.participants.forEach(p => {
    const cart = computeParticipantCart(p);
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'chip participant-chip';
    btn.setAttribute('aria-pressed', state.activeParticipantId === p.id ? 'true' : 'false');
    btn.innerHTML = `<span class="p-name">${p.name}</span><span class="p-stat">${fmtInt(cart.totalItems)}件・${fmtMoney(cart.totalAmount)}</span><span class="p-remove" title="移除跟團者">×</span>`;
    btn.addEventListener('click', (e) => {
      if (e.target.closest('.p-remove')){
        e.stopPropagation();
        removeParticipant(p.id);
        return;
      }
      if (state.activeParticipantId === p.id){
        renameParticipant(p.id);
      } else {
        setActiveParticipant(p.id);
      }
    });
    participantChipRowEl.appendChild(btn);
  });
  updateParticipantChipArrows();
}

/* ---- 共用庫存/金額計算 ---- */

function aggregatedQty(productId){
  return state.participants.reduce((sum, p) => sum + (p.qty[productId] || 0), 0);
}

function computeParticipantCart(participant){
  const lines = PRODUCTS
    .map(p => ({ ...p, qty: participant.qty[p.id] || 0 }))
    .filter(l => l.qty > 0);

  const totalItems = lines.reduce((sum, l) => sum + l.qty, 0);
  const totalAmount = lines.reduce((sum, l) => sum + l.qty * l.price, 0);

  return { lines, totalItems, totalAmount };
}

function computeAggregatedCart(){
  const lines = PRODUCTS
    .map(p => {
      const qty = aggregatedQty(p.id);
      return { ...p, qty, over: qty > p.limited };
    })
    .filter(l => l.qty > 0);

  const totalItems = lines.reduce((sum, l) => sum + l.qty, 0);
  const totalAmount = lines.reduce((sum, l) => sum + l.qty * l.price, 0);

  return { lines, totalItems, totalAmount };
}

function grandTotals(){
  const { totalItems, totalAmount } = computeAggregatedCart();
  return { totalItems, totalAmount };
}

/* ---- 商品卡片（依目前選取的跟團者，並套用全團共用限量） ---- */

function makeParticipantCard(p, participant){
  const card = document.createElement('article');
  card.className = 'card';
  card.dataset.id = p.id;

  function maxForActive(){
    const othersQty = aggregatedQty(p.id) - (participant.qty[p.id] || 0);
    return Math.max(0, p.limited - othersQty);
  }

  const initialCap = maxForActive();
  card.innerHTML = `
    <span class="sku">限量 ${p.limited}・剩 ${initialCap}${p.note ? ' · ' + p.note : ''}</span>
    <div class="info">
      <p class="series">${p.series || '隨機商品'}</p>
      <h2 class="name">${p.name}</h2>
      <p class="subname">${p.subname ? `${p.subname}．` : ''}<b>${fmtMoney(p.price)}</b></p>
    </div>
    <div class="stepper">
      <button type="button" class="dec" aria-label="減少「${p.name}」數量">−</button>
      <input class="qty-input" type="number" min="0" max="${initialCap}" step="1" inputmode="numeric"
             value="${participant.qty[p.id] || 0}" aria-label="「${p.name}」數量">
      <button type="button" class="inc" aria-label="增加「${p.name}」數量">+</button>
    </div>
  `;

  const skuEl = card.querySelector('.sku');
  const input = card.querySelector('.qty-input');
  const dec = card.querySelector('.dec');
  const inc = card.querySelector('.inc');

  function refreshCapDisplay(cap){
    input.max = cap;
    const n = participant.qty[p.id] || 0;
    skuEl.textContent = `限量 ${p.limited}・剩 ${cap}${p.note ? ' · ' + p.note : ''}`;
    skuEl.classList.toggle('sold-out', cap === 0 && n === 0);
    inc.disabled = n >= cap;
    dec.disabled = n <= 0;
  }

  function setQty(n){
    const cap = maxForActive();
    n = Math.max(0, Math.min(cap, Math.floor(Number.isFinite(n) ? n : 0)));
    participant.qty[p.id] = n;
    input.value = n;
    card.classList.toggle('has-qty', n > 0);
    refreshCapDisplay(cap);
    renderParticipantChips();
    updateFooter();
  }

  dec.addEventListener('click', () => setQty((participant.qty[p.id] || 0) - 1));
  inc.addEventListener('click', () => setQty((participant.qty[p.id] || 0) + 1));
  input.addEventListener('input', () => setQty(parseInt(input.value, 10)));
  input.addEventListener('blur', () => setQty(parseInt(input.value, 10) || 0));

  refreshCapDisplay(initialCap);
  return card;
}

/* ---- 主要內容渲染（挑選商品 / 總覽） ---- */

function renderMain(){
  const isSummary = state.view === 'summary';
  filterAreaEl.hidden = isSummary;
  catalogEl.hidden = isSummary;
  summaryViewEl.hidden = !isSummary;
  if (isSummary) renderSummaryView();
  else renderCatalog();
}

function renderCatalog(){
  catalogEl.innerHTML = '';
  const participant = activeParticipant();

  if (!participant){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = '請先新增跟團者，再開始選擇商品。';
    catalogEl.appendChild(empty);
    resultCountEl.textContent = '';
    return;
  }

  const visible = PRODUCTS.filter(matchesFilter);

  if (visible.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = '沒有符合搜尋條件的商品。';
    catalogEl.appendChild(empty);
  } else {
    const bySeries = new Map(SERIES_LIST.map((s, i) => [s, i]));
    const byCategory = new Map(CATEGORY_ORDER.map((c, i) => [c, i]));

    const grouped = new Map();
    visible.forEach(p => {
      if (!grouped.has(p.category)) grouped.set(p.category, []);
      grouped.get(p.category).push(p);
    });

    [...grouped.keys()]
      .sort((a, b) => byCategory.get(a) - byCategory.get(b))
      .forEach(category => {
        const products = grouped.get(category)
          .sort((a, b) => (bySeries.get(a.series) ?? -1) - (bySeries.get(b.series) ?? -1));

        const collapsed = state.collapsedCategories.has(category);

        const block = document.createElement('section');
        block.className = 'category-block';

        const header = document.createElement('button');
        header.type = 'button';
        header.className = 'category-header';
        header.setAttribute('aria-expanded', String(!collapsed));
        const subcategory = products[0].subcategory;
        header.innerHTML = `<span class="cat-name">${category}${subcategory ? `<span class="cat-subname"> · ${subcategory}</span>` : ''}</span><span class="cat-count">${products.length} 項</span>`;
        header.addEventListener('click', () => {
          if (state.collapsedCategories.has(category)) state.collapsedCategories.delete(category);
          else state.collapsedCategories.add(category);
          renderCatalog();
        });

        const body = document.createElement('div');
        body.className = 'category-body';
        if (collapsed) body.hidden = true;
        products.forEach(p => body.appendChild(makeParticipantCard(p, participant)));

        block.appendChild(header);
        block.appendChild(body);
        catalogEl.appendChild(block);
      });
  }

  resultCountEl.textContent = `顯示 ${visible.length} / ${PRODUCTS.length} 項商品`;
}

function itemRowHtml(l, showLimitTag){
  const line1 = (l.series === l.name ? [l.category, l.series] : [l.category, l.series, l.name]).filter(Boolean).join('．');
  const line2 = (l.subseries === l.subname ? [l.subcategory, l.subseries] : [l.subcategory, l.subseries, l.subname]).filter(Boolean).join('．');
  const qtyTag = showLimitTag ? `×${l.qty} / 限${l.limited}` : `×${l.qty}`;
  return `
    <div class="item-row${l.over ? ' aggregate-row' : ''}">
      <div class="item-lines">
        <div class="item-line1">${line1} <span class="n">${qtyTag}</span>${l.over ? '<span class="over-limit">超過限量</span>' : ''}</div>
        ${line2 ? `<div class="item-line2">${line2}</div>` : ''}
      </div>
      <span class="item-amount">${fmtMoney(l.qty * l.price)}</span>
    </div>`;
}

function renderSummaryView(){
  summaryViewEl.innerHTML = '';

  const wrap = document.createElement('div');
  wrap.className = 'summary-panels';

  const colA = document.createElement('div');
  colA.innerHTML = '<h3>跟團者明細</h3>';
  if (state.participants.length === 0){
    colA.innerHTML += '<p class="no-items">尚未新增任何跟團者。</p>';
  } else {
    state.participants.forEach(participant => {
      const cart = computeParticipantCart(participant);
      const card = document.createElement('div');
      card.className = 'participant-summary-card';
      const linesHtml = cart.lines.length
        ? cart.lines.map(l => itemRowHtml(l, false)).join('')
        : '<p class="no-items">尚未選擇商品。</p>';
      card.innerHTML = `
        <div class="p-head">
          <span class="p-name">${participant.name}</span>
          <span class="p-total">${fmtInt(cart.totalItems)} 件・${fmtMoney(cart.totalAmount)}</span>
        </div>
        ${linesHtml}
      `;
      colA.appendChild(card);
    });
  }

  const colB = document.createElement('div');
  colB.innerHTML = '<h3>全團彙總（依商品）</h3>';
  const agg = computeAggregatedCart();
  colB.innerHTML += agg.lines.length
    ? agg.lines.map(l => itemRowHtml(l, true)).join('')
    : '<p class="no-items">尚未選擇任何商品。</p>';

  wrap.appendChild(colA);
  wrap.appendChild(colB);
  summaryViewEl.appendChild(wrap);
}

/* ---- 頁尾統計（依目前檢視模式顯示對象不同） ---- */

function updateFooter(){
  if (state.view === 'summary'){
    const { totalItems, totalAmount } = grandTotals();
    statItemsEl.textContent = fmtInt(totalItems);
    statTotalEl.textContent = fmtMoney(totalAmount);
    itemListTitleEl.textContent = '全團彙總商品';
    renderItemList(computeAggregatedCart().lines, true);
  } else {
    const participant = activeParticipant();
    const cart = participant ? computeParticipantCart(participant) : { lines: [], totalItems: 0, totalAmount: 0 };
    statItemsEl.textContent = fmtInt(cart.totalItems);
    statTotalEl.textContent = fmtMoney(cart.totalAmount);
    itemListTitleEl.textContent = participant ? `${participant.name}．已選商品` : '已選商品';
    renderItemList(cart.lines, false);
  }
}

function renderItemList(lines, showLimitTag){
  itemListEl.innerHTML = lines.length
    ? lines.map(l => itemRowHtml(l, showLimitTag)).join('')
    : '<p class="no-items">尚未選擇任何商品。</p>';
}

/* ---- CSV 匯出 / 匯入 ---- */

function csvEscape(v){
  const s = String(v ?? '');
  return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function exportGroupCsv(){
  if (state.participants.length === 0){
    alert('尚未新增任何跟團者，無法匯出。');
    return;
  }

  const rows = [
    ['跟團者', '分類', '作品', '名稱', '原文分類', '原文作品', '原文名稱', '單價', '數量', '小計'],
  ];
  state.participants.forEach(participant => {
    computeParticipantCart(participant).lines.forEach(l => {
      rows.push([
        participant.name,
        l.category, l.series || '', l.name,
        l.subcategory || '', l.subseries || '', l.subname || '',
        l.price, l.qty, l.qty * l.price,
      ]);
    });
  });

  const { totalItems, totalAmount } = grandTotals();
  rows.push([]);
  rows.push(['跟團者名單', ...state.participants.map(p => p.name)]);
  rows.push([]);
  rows.push(['總件數', totalItems]);
  rows.push(['總金額', totalAmount]);

  const csv = rows.map(r => r.map(csvEscape).join(',')).join('\r\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const ts = new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-');
  a.href = url;
  a.download = `團購清單_${ts}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

const exportBtn = document.getElementById('exportBtn');
exportBtn.addEventListener('click', exportGroupCsv);

function parseCsvLine(line){
  const cells = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++){
    const ch = line[i];
    if (inQuotes){
      if (ch === '"'){
        if (line[i + 1] === '"'){ cur += '"'; i++; }
        else { inQuotes = false; }
      } else {
        cur += ch;
      }
    } else if (ch === '"'){
      inQuotes = true;
    } else if (ch === ','){
      cells.push(cur);
      cur = '';
    } else {
      cur += ch;
    }
  }
  cells.push(cur);
  return cells;
}

function importGroupCsv(file){
  const reader = new FileReader();
  reader.onload = () => {
    const text = String(reader.result).replace(/^﻿/, '');
    const rawLines = text.split(/\r\n|\n/);
    const lines = rawLines.slice(1); // skip header row

    const participantsByName = new Map();
    const orderedNames = [];
    let importedCount = 0;
    let notFoundCount = 0;

    function getOrCreate(name){
      if (!participantsByName.has(name)){
        participantsByName.set(name, newParticipant(name));
        orderedNames.push(name);
      }
      return participantsByName.get(name);
    }

    let i = 0;
    for (; i < lines.length; i++){
      const line = lines[i];
      if (!line.trim()) break; // 到達空白分隔列
      const cells = parseCsvLine(line);
      const [participantName, category, series, name, , , , , qtyStr] = cells;
      if (participantName === '總件數' || participantName === '總金額') break;

      const qty = parseInt(qtyStr, 10);
      if (!qty) continue;

      const participant = getOrCreate(participantName || '(未命名)');
      const product = PRODUCTS.find(p =>
        p.category === category && (p.series || '') === series && p.name === name
      );
      if (product){
        participant.qty[product.id] = Math.min(qty, product.limited);
        importedCount++;
      } else {
        notFoundCount++;
      }
    }

    // 讀取空白分隔列之後的「跟團者名單」列，確保沒有任何品項的跟團者也能被還原。
    for (; i < lines.length; i++){
      const line = lines[i];
      if (!line.trim()) continue;
      const cells = parseCsvLine(line);
      if (cells[0] === '跟團者名單'){
        cells.slice(1).forEach(name => { if (name) getOrCreate(name); });
      }
      if (cells[0] === '總件數' || cells[0] === '總金額') break;
    }

    const participants = orderedNames.map(name => participantsByName.get(name));

    // 偵測匯入資料是否違反全團共用限量（例如手動編輯過 CSV），絕不自動重新分配數量。
    let overLimitCount = 0;
    PRODUCTS.forEach(p => {
      const total = participants.reduce((sum, part) => sum + (part.qty[p.id] || 0), 0);
      if (total > p.limited) overLimitCount++;
    });

    state.participants = participants;
    state.activeParticipantId = participants.length ? participants[0].id : null;
    renderParticipantChips();
    renderMain();
    updateFooter();

    const parts = [`已匯入 ${importedCount} 筆`];
    if (notFoundCount > 0) parts.push(`${notFoundCount} 筆找不到對應商品`);
    if (overLimitCount > 0) parts.push(`${overLimitCount} 項商品超過限量上限，已標記但未自動修改，請至「檢視總購買清單」確認`);
    alert(parts.join('，') + '。');
  };
  reader.readAsText(file, 'utf-8');
}

const importBtn = document.getElementById('importBtn');
const importFileEl = document.getElementById('importFile');
importBtn.addEventListener('click', () => importFileEl.click());
importFileEl.addEventListener('change', () => {
  const file = importFileEl.files[0];
  if (file) importGroupCsv(file);
  importFileEl.value = '';
});

  participantNameInput.focus();
});
participantNameInput.addEventListener('keydown', (e) => {

});

  viewToggleBtn.textContent = state.view === 'summary' ? '返回選購' : '檢視總購買清單';

  updateFooter();
});

searchEl.addEventListener('input', () => {
  state.search = searchEl.value;
  renderCatalog();

toggleBtn.addEventListener('click', () => {
  const open = !document.body.classList.contains('ticket-open');

  toggleBtn.setAttribute('aria-expanded', String(open));
  toggleBtn.textContent = open ? '收合清單' : '查看清單';

buildCategoryChips();

renderParticipantChips();
renderMain();
updateFooter();
